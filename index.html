<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ram Daftari - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>
    <div class="content">
        <h1>Ram Daftari</h1>
        <div class="buttons">
            <a href="https://www.linkedin.com" target="_blank" class="button">LinkedIn</a>
            <a href="https://github.com" target="_blank" class="button">GitHub</a>
            <a href="https://twitter.com" target="_blank" class="button">Twitter</a>
            <a href="resume.pdf" target="_blank" class="button">Resume</a>
        </div>
    </div>
    <script>
        // Directly configuring particles.js with JavaScript

        particlesJS('particles-js', {
            "particles": {
                "number": {
                    "value": 100
                },
                "color": {
                    "value": "#ffffff"
                },
                "shape": {
                    "type": "circle"
                },
                "move": {
                    "enable": true,
                    "speed": 3
                }
            }
        });
    </script>
</body>
</html>
